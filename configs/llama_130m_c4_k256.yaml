model:
  name: 130m_k256
  hidden_size: 768
  intermediate_size: 2048
  num_hidden_layers: 12
  num_attention_heads: 12
  k: 256

data:
  mode: t5_padding
  tokenizer_name: t5-base
  shuffle_docs: true
  shuffle_seed: 42
  shuffle_buffer_docs: 1000

training:
  seed: 0
  total_batch_size: 512
  micro_batch_size: 256
  seq_len: 256
  max_steps: 20000
  training_tokens: 2621440000
  learning_rate: 2.5e-3
  warmup_steps: 2000
  min_lr_ratio: 0.0
  weight_decay: 0.0
  beta1: 0.9
  beta2: 0.999
  grad_clip: 0.0
  log_every: 50

evaluation:
  micro_batch_size: 256
  max_batches: 256
  max_docs: null
  target_nonpad_tokens: 10000000
  shuffle_docs: true
  shuffle_seed: 42
  shuffle_buffer_docs: 1000
